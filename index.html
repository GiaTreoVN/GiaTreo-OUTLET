<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUTLET | Giá treo màn hình / TV | OUTLET</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .status {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .status.loading {
            color: #ff9800;
        }

        .status.error {
            color: #f44336;
        }

        .status.success {
            color: #4caf50;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: box-shadow 0.3s ease;
        }

        .product-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }

        .product-images {
            width: 100%;
            aspect-ratio: 1;
            background-color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .product-images img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-counter {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            display: none;
        }

        .image-counter.show {
            display: block;
        }

        .product-nav {
            display: flex;
            gap: 5px;
            margin-top: 8px;
            justify-content: center;
        }

        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ccc;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .nav-dot.active {
            background-color: #333;
        }

        .image-nav-arrows {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            pointer-events: none;
        }

        .arrow-button {
            width: 40px;
            height: 40px;
            background-color: rgba(255, 255, 255, 0.8);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #333;
            transition: all 0.3s ease;
            pointer-events: auto;
        }

        .arrow-button:hover:not(:disabled) {
            background-color: rgba(255, 255, 255, 0.95);
            transform: scale(1.1);
        }

        .arrow-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .product-info {
            padding: 15px;
        }

        .product-id {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }

        .product-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 1.3em;
            color: #e53935;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .product-quantity {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .quantity-badge {
            display: inline-block;
            background-color: #f0f0f0;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            color: #333;
        }

        .product-description {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            max-height: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .error-message {
            background-color: #ffebee;
            border: 1px solid #f44336;
            color: #c62828;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .setup-guide {
            background-color: #e3f2fd;
            border: 1px solid #2196f3;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .setup-guide h3 {
            color: #1976d2;
            margin-bottom: 10px;
        }

        .setup-guide p {
            color: #555;
            font-size: 14px;
            line-height: 1.6;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        button {
            background-color: #2196f3;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }

        button:hover {
            background-color: #1976d2;
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }

            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>OUTLET | Giá treo màn hình / TV | OUTLET</h1>
            <p class="status loading" id="status">Đang tải dữ liệu...</p>
        </header>



        <div id="error-container"></div>
        <div id="products-container" class="products-grid"></div>
        <div id="empty-state" class="empty-state" style="display: none;">
            Không có sản phẩm nào
        </div>
    </div>

    <script>
        // ===== CẤU HÌNH =====
        const GOOGLE_SHEETS_ID = '1HLVTW3czRYa8FXn7PLRTwqw21DJUO9RWCerJlj43eVg';

        // ===== HÀM CHÍNH =====
        async function loadProducts() {
            updateStatus('Đang tải dữ liệu...', 'loading');

            try {
                const url = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEETS_ID}/gviz/tq?tqx=out:json`;
                const response = await fetch(url);
                const text = await response.text();

                // Xóa phần "/*O_o*/" ở đầu và cuối
                const jsonText = text.substring(47).slice(0, -2);
                const data = JSON.parse(jsonText);

                if (data.table && data.table.rows.length > 0) {
                    displayProducts(data.table);
                    updateStatus(`Tải thành công ${data.table.rows.length} sản phẩm`, 'success');
                } else {
                    showError('Google Sheets không có dữ liệu. Vui lòng kiểm tra lại.');
                }
            } catch (error) {
                console.error('Lỗi:', error);
                showError(`Lỗi tải dữ liệu: ${error.message}<br>Kiểm tra lại Google Sheets ID và quyền truy cập.`);
            }
        }

        function displayProducts(table) {
            const container = document.getElementById('products-container');
            const emptyState = document.getElementById('empty-state');
            container.innerHTML = '';
            emptyState.style.display = 'none';

            if (!table.rows || table.rows.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            table.rows.forEach((row, index) => {
                const cells = row.c;
                if (!cells || !cells[1]) return; // Bỏ qua nếu không có tên sản phẩm

                const product = {
                    id: cells[0]?.v || '',
                    name: cells[1]?.v || 'Không có tên',
                    images: (cells[2]?.v || '').split(',').map(s => s.trim()).filter(s => s),
                    description: cells[3]?.v || '',
                    price: cells[4]?.v || 0,
                    quantity: cells[5]?.v || 0
                };

                const card = createProductCard(product);
                container.appendChild(card);
            });
        }

        function createProductCard(product) {
            const card = document.createElement('div');
            card.className = 'product-card';

            // Phần hình ảnh
            let imagesHtml = '';
            if (product.images.length > 0) {
                imagesHtml = `
                    <div class="product-images" data-product-id="${product.id}">
                        ${product.images.map((img, idx) => `
                            <img src="${img}" alt="${product.name}" class="product-image" style="display: ${idx === 0 ? 'block' : 'none'};" data-index="${idx}">
                        `).join('')}
                        ${product.images.length > 1 ? `
                            <div class="image-nav-arrows" data-product-id="${product.id}">
                                <button class="arrow-button prev-button" data-product-id="${product.id}" title="Ảnh trước">❮</button>
                                <button class="arrow-button next-button" data-product-id="${product.id}" title="Ảnh tiếp theo">❯</button>
                            </div>
                            <div class="image-counter show">${1}/${product.images.length}</div>
                        ` : ''}
                    </div>
                `;
                if (product.images.length > 1) {
                    imagesHtml += `
                        <div class="product-nav" data-product-id="${product.id}">
                            ${product.images.map((_, idx) => `
                                <span class="nav-dot ${idx === 0 ? 'active' : ''}" data-index="${idx}"></span>
                            `).join('')}
                        </div>
                    `;
                }
            } else {
                imagesHtml = `<div class="product-images" style="color: #ccc; font-size: 14px;">Không có hình ảnh</div>`;
            }

            // Phần thông tin
            const priceFormatted = new Intl.NumberFormat('vi-VN', {
                style: 'currency',
                currency: 'VND'
            }).format(product.price);

            const quantityClass = product.quantity > 0 ? '' : 'style="color: #f44336; font-weight: bold;"';

            card.innerHTML = `
                ${imagesHtml}
                <div class="product-info">
                    ${product.id ? `<div class="product-id">ID: ${product.id}</div>` : ''}
                    <div class="product-name">${product.name}</div>
                    <div class="product-price">${priceFormatted}</div>
                    <div class="product-quantity">
                        Số lượng: <span class="quantity-badge" ${quantityClass}>${product.quantity}</span>
                    </div>
                    ${product.description ? `<div class="product-description">${product.description}</div>` : ''}
                </div>
            `;

            // Thêm sự kiện cho gallery ảnh
            if (product.images.length > 1) {
                const dots = card.querySelectorAll('.nav-dot');
                const images = card.querySelectorAll('.product-image');
                const counter = card.querySelector('.image-counter');
                const prevBtn = card.querySelector('.prev-button');
                const nextBtn = card.querySelector('.next-button');

                const updateArrowStates = () => {
                    const currentIndex = Array.from(images).findIndex(img => img.style.display !== 'none');
                    prevBtn.disabled = currentIndex === 0;
                    nextBtn.disabled = currentIndex === images.length - 1;
                };

                const showImageByIndex = (index) => {
                    showImage(card, index, counter);
                    updateArrowStates();
                };

                dots.forEach(dot => {
                    dot.addEventListener('click', (e) => {
                        const index = parseInt(e.target.dataset.index);
                        showImageByIndex(index);
                    });
                });

                prevBtn.addEventListener('click', (e) => {
                    const currentIndex = Array.from(images).findIndex(img => img.style.display !== 'none');
                    if (currentIndex > 0) {
                        showImageByIndex(currentIndex - 1);
                    }
                });

                nextBtn.addEventListener('click', (e) => {
                    const currentIndex = Array.from(images).findIndex(img => img.style.display !== 'none');
                    if (currentIndex < images.length - 1) {
                        showImageByIndex(currentIndex + 1);
                    }
                });

                // Khởi tạo trạng thái nút
                updateArrowStates();
            }

            return card;
        }

        function showImage(card, index, counter) {
            const images = card.querySelectorAll('.product-image');
            const dots = card.querySelectorAll('.nav-dot');

            images.forEach(img => img.style.display = 'none');
            dots.forEach(dot => dot.classList.remove('active'));

            images[index].style.display = 'block';
            dots[index].classList.add('active');

            if (counter) {
                counter.textContent = `${index + 1}/${images.length}`;
            }
        }

        function updateStatus(message, type) {
            const status = document.getElementById('status');
            if (type === 'success') {
              status.style.display = 'none';
            } else {
              status.style.display = 'block';
            }
            status.textContent = message;
            status.className = `status ${type}`;
        }

        function showError(message) {
            const container = document.getElementById('error-container');
            container.innerHTML = `<div class="error-message">${message}</div>`;
            document.getElementById('products-container').innerHTML = '';
            updateStatus('Lỗi tải dữ liệu', 'error');
        }

        window.addEventListener('load', loadProducts);
    </script>
</body>
</html>
